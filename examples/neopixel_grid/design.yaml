project:
  name: neopixel_grid
  kicad_version: 10

board:
  size: [100, 100]
  paper: A4

global_nets: [VCC, GND]

templates:
  ws2812b:
    symbol: LED:WS2812B
    footprint: LED_SMD:LED_WS2812B_PLCC4_5.0x5.0mm_P3.2mm
    value: WS2812B

  decoupling_cap:
    symbol: Device:C
    footprint: Capacitor_SMD:C_0603_1608Metric_Pad1.08x0.95mm_HandSolder
    value: 100nF

sheets:
  main:
    paper: A4
    components:
      - ref: J1
        symbol: Connector_Generic:Conn_01x03
        footprint: Connector_PinHeader_2.54mm:PinHeader_1x03_P2.54mm_Vertical
        value: "Header 3P"
        pcb:
          position: [10, 90]
          layer: front
        pin_nets:
          "1": VCC
          "2": D1
          "3": GND

    grids:
      - id: leds
        shape: [8, 8]
        pitch: [10, 10]
        origin: [15, 15]
        order: row_major
        layer: front
        parts_per_cell:
          - template: ws2812b
            ref: "LED{index}"
            pin_nets:
              "1": VCC
              "2": "D{index+1}"
              "3": GND
              "4": "D{index}"
          - template: decoupling_cap
            ref: "C{index}"
            offset: [0, 3]
            pin_nets:
              "1": VCC
              "2": GND
